name: CI - Train and save the model
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: abhayshrivastava/iris-mlops

jobs:
  train:
    name: Train and save the model
    runs-on: ubuntu-latest
    strategy: # This makes sure it runs on both the versions of python
      matrix:
        python: [3.11, 3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project dependencies
        run: python -m pip install -r requirements.txt

      - name: Train the model
        run: |
          python train.py
          ls -la artifacts

      - name: Upload artifacts (model + metrics)
        if: ${{ matrix.python == '3.12' }}
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifact-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error

  dockerize:
    name: Build & push Docker image
    needs: train
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts from train job
        uses: actions/download-artifact@v4
        with:
          name: ml-artifact-${{ github.run_id }}
          path: artifacts

      - name: Verify downloaded artifact
        run: ls -la artifacts

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG: ${GITHUB_SHA::7}
          echo "Using tag: $IMAGE_TAG"
          
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest
